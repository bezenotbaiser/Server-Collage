<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>☽ Server Collage ☾</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#04050d;--bg2:#080b18;--surface:#0b0e1f;--card:#0e1228;
    --border:#1a2255;--borderglow:#1e3a8a;--blue1:#1d4ed8;--blue2:#3b82f6;
    --blue3:#93c5fd;--bluedeep:#0f2460;--text:#c7d7f5;--muted:#4a5a8a;--dim:#1e2a52;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;cursor:crosshair;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(29,78,216,.13) 0%,transparent 60%),radial-gradient(ellipse 60% 30% at 20% 100%,rgba(15,36,96,.2) 0%,transparent 55%),radial-gradient(ellipse 50% 20% at 80% 80%,rgba(37,99,235,.08) 0%,transparent 50%);pointer-events:none;}
  body::after{content:'';position:fixed;inset:0;z-index:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg width='60' height='90' viewBox='0 0 60 90' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0 Q0 30 0 60 L0 90 L60 90 L60 60 Q60 30 30 0Z' fill='none' stroke='%233b82f6' stroke-width='1'/%3E%3C/svg%3E");background-size:60px 90px;pointer-events:none;}
  .particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
  .particle{position:absolute;width:2px;height:2px;background:var(--blue2);border-radius:50%;box-shadow:0 0 4px var(--blue2);animation:drift linear infinite;opacity:0;}
  @keyframes drift{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.6}90%{opacity:.3}100%{transform:translateY(-10vh) translateX(30px);opacity:0}}
  header{position:relative;z-index:10;padding:44px 44px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(4,5,13,.95) 0%,transparent 100%);}
  header::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue1),var(--blue2),var(--blue1),transparent);animation:shimmer 4s ease-in-out infinite;}
  @keyframes shimmer{0%,100%{opacity:.4}50%{opacity:1}}
  .header-eyebrow{font-family:'IM Fell English',serif;font-style:italic;font-size:12px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px;}
  .header-title{font-family:'UnifrakturMaguntia',cursive;font-size:clamp(32px,6vw,62px);line-height:1;color:var(--blue3);text-shadow:0 0 20px rgba(59,130,246,.7),0 0 60px rgba(29,78,216,.4),0 2px 0 #000;letter-spacing:2px;}
  .header-deco{font-size:28px;align-self:center;animation:sway 6s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(59,130,246,.6));}
  @keyframes sway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
  .live-badge{margin-left:auto;background:var(--card);border:1px solid var(--borderglow);border-radius:6px;padding:10px 18px;font-size:11px;color:var(--blue3);letter-spacing:2px;display:flex;align-items:center;gap:8px;box-shadow:0 0 12px rgba(30,58,138,.4),inset 0 0 10px rgba(29,78,216,.05);text-transform:uppercase;align-self:center;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--blue2);box-shadow:0 0 8px var(--blue2),0 0 16px var(--blue1);animation:pulse-dot 2s ease-in-out infinite;}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
  .ornament{position:relative;z-index:10;text-align:center;padding:10px 0 4px;color:var(--muted);font-size:18px;letter-spacing:12px;text-shadow:0 0 10px var(--blue1);user-select:none;}
  .upload-panel{position:relative;z-index:10;margin:14px 44px 20px;background:linear-gradient(135deg,rgba(11,14,31,.98) 0%,rgba(8,11,24,.98) 100%);border:1px solid var(--borderglow);border-radius:4px;padding:26px 30px;display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap;box-shadow:0 0 0 1px rgba(37,99,235,.1),0 0 30px rgba(29,78,216,.15),inset 0 0 40px rgba(15,36,96,.1);}
  .upload-panel::before,.upload-panel::after{position:absolute;font-size:20px;color:var(--blue1);opacity:.6;line-height:1;}
  .upload-panel::before{content:'✦';top:8px;left:12px;}
  .upload-panel::after{content:'✦';bottom:8px;right:12px;}
  .panel-corner-tr{position:absolute;top:8px;right:12px;color:var(--blue1);opacity:.6;font-size:20px;}
  .panel-corner-bl{position:absolute;bottom:8px;left:12px;color:var(--blue1);opacity:.6;font-size:20px;}
  .upload-label{font-family:'IM Fell English',serif;font-style:italic;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:3px;display:block;margin-bottom:7px;}
  .input-field{background:rgba(4,5,13,.9);border:1px solid var(--border);border-radius:3px;color:var(--blue3);font-family:'Share Tech Mono',monospace;font-size:13px;padding:10px 14px;outline:none;transition:border-color .25s,box-shadow .25s;width:200px;letter-spacing:1px;}
  .input-field:focus{border-color:var(--blue1);box-shadow:0 0 12px rgba(29,78,216,.35);}
  .input-field::placeholder{color:var(--dim);}
  .file-btn{display:inline-block;background:rgba(4,5,13,.9);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;padding:10px 16px;cursor:pointer;transition:border-color .2s,box-shadow .2s;white-space:nowrap;letter-spacing:1px;}
  .file-btn:hover{border-color:var(--blue2);box-shadow:0 0 10px rgba(59,130,246,.2);}
  #file-input{display:none;}
  .file-name{font-size:10px;color:var(--blue2);margin-top:5px;min-height:15px;letter-spacing:1px;}
  #preview-img{width:78px;height:78px;border-radius:3px;object-fit:cover;border:1px solid var(--borderglow);display:none;box-shadow:0 0 16px rgba(29,78,216,.4);}
  .add-btn{background:linear-gradient(135deg,var(--bluedeep) 0%,var(--blue1) 100%);border:1px solid var(--blue2);border-radius:3px;color:#d6e4ff;font-family:'IM Fell English',serif;font-style:italic;font-size:15px;padding:11px 28px;cursor:pointer;letter-spacing:2px;transition:transform .15s,box-shadow .2s,background .2s;box-shadow:0 0 20px rgba(29,78,216,.45),inset 0 1px 0 rgba(147,197,253,.1);align-self:flex-end;text-shadow:0 0 10px rgba(147,197,253,.5);}
  .add-btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(59,130,246,.6),inset 0 1px 0 rgba(147,197,253,.2);background:linear-gradient(135deg,var(--blue1) 0%,var(--blue2) 100%);color:#fff;}
  .add-btn:active{transform:translateY(0);}
  .add-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .section-header{position:relative;z-index:10;padding:8px 44px 14px;display:flex;align-items:center;gap:16px;}
  .section-title{font-family:'IM Fell English',serif;font-style:italic;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:5px;white-space:nowrap;}
  .section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
  .section-count{font-size:11px;color:var(--blue2);letter-spacing:2px;}
  .collage-grid{position:relative;z-index:10;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:3px;padding:0 44px 70px;}
  .empty-state{grid-column:1/-1;text-align:center;padding:100px 20px;color:var(--muted);}
  .empty-icon{font-size:52px;margin-bottom:18px;opacity:.3;animation:sway 6s ease-in-out infinite;display:block;}
  .empty-text{font-family:'IM Fell English',serif;font-style:italic;font-size:14px;letter-spacing:3px;color:var(--dim);}
  .photo-card{position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer;background:var(--card);animation:rise .5s cubic-bezier(.16,1,.3,1) both;border:1px solid transparent;transition:border-color .3s;}
  .photo-card:hover{border-color:var(--borderglow);}
  @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .photo-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease,filter .4s ease;filter:saturate(.😎 brightness(.92);}
  .photo-card:hover img{transform:scale(1.07);filter:saturate(1.1) brightness(1) hue-rotate(-10deg);}
  .photo-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(4,5,13,.96) 0%,rgba(8,11,24,.6) 40%,transparent 70%);opacity:0;transition:opacity .3s;display:flex;flex-direction:column;justify-content:flex-end;padding:14px 12px;}
  .photo-card:hover .photo-overlay{opacity:1;}
  .photo-glow-border{position:absolute;inset:0;border:1px solid transparent;box-shadow:inset 0 0 20px rgba(29,78,216,.35);opacity:0;transition:opacity .3s;pointer-events:none;}
  .photo-card:hover .photo-glow-border{opacity:1;}
  .photo-username{font-family:'IM Fell English',serif;font-style:italic;font-size:14px;color:var(--blue3);text-shadow:0 0 12px rgba(59,130,246,.😎,0 1px 4px #000;display:flex;align-items:center;gap:5px;}
  .at-sign{color:var(--muted);font-size:11px;}
  .photo-date{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:1px;}
  .remove-btn{position:absolute;top:8px;right:8px;background:rgba(4,5,13,.9);border:1px solid var(--border);border-radius:3px;color:var(--blue2);font-size:10px;padding:4px 8px;cursor:pointer;opacity:0;transition:opacity .2s,border-color .2s;font-family:'Share Tech Mono',monospace;letter-spacing:1px;z-index:10;}
  .photo-card:hover .remove-btn{opacity:1;}
  .remove-btn:hover{border-color:var(--blue2);box-shadow:0 0 8px rgba(59,130,246,.3);}
  .lightbox{position:fixed;inset:0;z-index:200;background:rgba(4,5,13,.97);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(12px);}
  .lightbox.open{opacity:1;pointer-events:all;}
  .lightbox-inner{display:flex;flex-direction:column;align-items:center;gap:18px;max-width:90vw;}
  .lightbox-frame{position:relative;border:1px solid var(--borderglow);box-shadow:0 0 0 1px rgba(29,78,216,.2),0 0 60px rgba(29,78,216,.35),0 30px 80px rgba(0,0,0,.8);border-radius:2px;}
  .lightbox-img{max-width:min(82vw,600px);max-height:65vh;object-fit:contain;display:block;transform:scale(.93);transition:transform .35s cubic-bezier(.16,1,.3,1);filter:saturate(.9);}
  .lightbox.open .lightbox-img{transform:scale(1);}
  .lightbox-caption{text-align:center;}
  .lightbox-name{font-family:'UnifrakturMaguntia',cursive;font-size:22px;color:var(--blue3);text-shadow:0 0 20px rgba(59,130,246,.7);letter-spacing:2px;}
  .lightbox-date{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:2px;font-family:'IM Fell English',serif;font-style:italic;}
  .lightbox-close{position:fixed;top:22px;right:28px;background:var(--card);border:1px solid var(--border);border-radius:3px;color:var(--muted);font-size:18px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s,border-color .2s,box-shadow .2s;font-family:'Share Tech Mono',monospace;}
  .lightbox-close:hover{color:var(--blue3);border-color:var(--blue1);box-shadow:0 0 12px rgba(29,78,216,.4);}
  .toast{position:fixed;bottom:28px;right:28px;z-index:300;background:linear-gradient(135deg,var(--card),var(--surface));border:1px solid var(--borderglow);color:var(--blue3);font-family:'IM Fell English',serif;font-style:italic;font-size:13px;padding:12px 22px;border-radius:3px;box-shadow:0 0 20px rgba(29,78,216,.35);opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none;letter-spacing:1px;}
  .toast.show{opacity:1;transform:translateY(0);}
  .loading-overlay{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;transition:opacity .5s;}
  .loading-overlay.hidden{opacity:0;pointer-events:none;}
  .loading-title{font-family:'UnifrakturMaguntia',cursive;font-size:36px;color:var(--blue2);text-shadow:0 0 20px rgba(59,130,246,.6);animation:flicker 2s ease-in-out infinite;}
  @keyframes flicker{0%,100%{opacity:1}45%{opacity:.8}47%{opacity:.3}49%{opacity:.9}}
  .loading-bar{width:200px;height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
  .loading-fill{height:100%;background:linear-gradient(90deg,var(--blue1),var(--blue2));animation:load-fill 1.2s ease-in-out forwards;}
  @keyframes load-fill{from{width:0%}to{width:100%}}
  .input-group{display:flex;flex-direction:column;}
  .preview-wrap{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
  @media(max-width:600px){header,.upload-panel,.section-header,.collage-grid{padding-left:16px;padding-right:16px;}.upload-panel{flex-direction:column;}.input-field{width:100%;}.add-btn{width:100%;text-align:center;}.collage-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-title">☽ Awakening ☾</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div class="particles" id="particles"></div>

<header>
  <div>
    <div class="header-eyebrow">— The Eternal Gallery —</div>
    <div class="header-title">☽ Server Collage ☾</div>
  </div>
  <div class="header-deco">🕯</div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span id="count-display">0 SOULS</span>
  </div>
</header>

<div class="ornament">⸸ &nbsp; ✦ &nbsp; ⸸</div>

<div class="upload-panel">
  <span class="panel-corner-tr">✦</span>
  <span class="panel-corner-bl">✦</span>
  <div class="input-group">
    <label class="upload-label">Thy Name</label>
    <input class="input-field" id="username-input" type="text" placeholder="your_name" maxlength="30"/>
  </div>
  <div class="input-group">
    <label class="upload-label">Thy Likeness</label>
    <label class="file-btn" for="file-input">⚰ Choose Photo</label>
    <input type="file" id="file-input" accept="image/*"/>
    <div class="file-name" id="file-name">No offering selected</div>
  </div>
  <div class="preview-wrap">
    <img id="preview-img" src="" alt="preview"/>
  </div>
  <button class="add-btn" id="add-btn" onclick="addPhoto()">✦ Offer to the Gallery</button>
</div>

<div class="section-header">
  <div class="section-title">The Gathered Souls</div>
  <div class="section-line"></div>
  <div class="section-count" id="section-count">—</div>
</div>

<div class="collage-grid" id="collage-grid">
  <div class="empty-state" id="empty-state">
    <span class="empty-icon">🕯</span>
    <div class="empty-text">The gallery awaits its first soul...</div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-inner" onclick="event.stopPropagation()">
    <div class="lightbox-frame">
      <img class="lightbox-img" id="lightbox-img" src="" alt=""/>
    </div>
    <div class="lightbox-caption">
      <div class="lightbox-name" id="lightbox-name"></div>
      <div class="lightbox-date" id="lightbox-date"></div>
    </div>
  </div>
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://avtfywbrgvsrzqxerokr.supabase.co',
    'sb_publishable_Xoy93nYTHHHQGpaBGmfoEw_6jj_FuMW'
  );

  // Particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
    p.style.animationDuration = (Math.random() * 12 + 😎 + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    pc.appendChild(p);
  }

  let photos = [];
  let selectedFile = null;

  document.getElementById('file-input').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    selectedFile = file;
    document.getElementById('file-name').textContent = file.name.length > 26 ? file.name.slice(0,24)+'…' : file.name;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('preview-img');
      img.src = e.target.result; img.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  function compressImage(file, maxWidth, quality) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  async function addPhoto() {
    const username = document.getElementById('username-input').value.trim();
    if (!username) { showToast('✦ Speak thy name first...'); return; }
    if (!selectedFile) { showToast('✦ Choose a likeness to offer...'); return; }
    const btn = document.getElementById('add-btn');
    btn.textContent = '☽ Inscribing...'; btn.disabled = true;
    try {
      // Compress to max 800px wide, 70% quality to stay under Supabase row limit
      const src = await compressImage(selectedFile, 800, 0.7);
      const date = new Date().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
      const { error } = await sb.from('photos').insert([{ username, src, date }]);
      if (error) {
        showToast('✦ The spirits refused... try again.');
        console.error(error);
      } else {
        showToast(✦ ${username} has joined the gallery);
        document.getElementById('username-input').value = '';
        document.getElementById('file-input').value = '';
        document.getElementById('file-name').textContent = 'No offering selected';
        const img = document.getElementById('preview-img');
        img.src = ''; img.style.display = 'none';
        selectedFile = null;
      }
    } catch(err) {
      showToast('✦ The spirits refused... try again.');
      console.error(err);
    }
    btn.textContent = '✦ Offer to the Gallery'; btn.disabled = false;
  }

  async function removePhoto(id) {
    const { error } = await sb.from('photos').delete().eq('id', id);
    if (!error) showToast('✦ Soul has departed the gallery.');
  }

  async function fetchPhotos() {
    const { data, error } = await sb.from('photos').select('*').order('created_at', { ascending: false });
    if (!error && data) { photos = data; renderGrid(); }
  }

  // Real-time: any change to the table re-fetches
  sb.channel('photos-room')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'photos' }, () => fetchPhotos())
    .subscribe();

  function openLightbox(photo) {
    document.getElementById('lightbox-img').src = photo.src;
    document.getElementById('lightbox-name').textContent = photo.username;
    document.getElementById('lightbox-date').textContent = photo.date;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  function renderGrid() {
    const grid = document.getElementById('collage-grid');
    const empty = document.getElementById('empty-state');
    const n = photos.length;
    document.getElementById('count-display').textContent = n + (n===1?' SOUL':' SOULS');
    document.getElementById('section-count').textContent = n > 0 ? n + ' portrait' + (n>1?'s':'') : '—';
    grid.querySelectorAll('.photo-card').forEach(c => c.remove());
    if (n === 0) { empty.style.display = ''; return; }
    empty.style.display = 'none';
    photos.forEach((photo, i) => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.style.animationDelay = Math.min(i,10)*.04+'s';
      card.innerHTML = `
        <img src="${photo.src}" alt="${esc(photo.username)}" loading="lazy"/>
        <div class="photo-glow-border"></div>
        <div class="photo-overlay">
          <div class="photo-username"><span class="at-sign">@</span>${esc(photo.username)}</div>
          <div class="photo-date">${photo.date}</div>
        </div>
        <button class="remove-btn" onclick="event.stopPropagation();removePhoto(${photo.id})">✕ banish</button>
      `;
      card.addEventListener('click', () => openLightbox(photo));
      grid.appendChild(card);
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  (async () => {
    await fetchPhotos();
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1300);
  })();
</script>

</body>
</html>
